pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenCentral()
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == 'biz.digitalindustry.grimoire') {
                useModule("biz.digitalindustry:grimoire:${requested.version}")
            }
        }
    }
}

/*
